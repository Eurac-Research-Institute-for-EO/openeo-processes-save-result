name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.image }}
    strategy:
      matrix:
        os: [Ubuntu]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - os: Ubuntu
            image: ubuntu-24.04
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }} with geospatial dependencies
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: save-result-test
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          create-args: >-
            python=${{ matrix.python-version }}
            pip
            gdal
            rasterio

      - name: Checkout openeo-processes-dask (main)
        uses: actions/checkout@v6
        with:
          repository: Eurac-Research-Institute-for-EO/openeo-processes-dask
          ref: main
          path: openeo-processes-dask
          submodules: recursive

      - name: Install openeo-processes-dask
        shell: bash -el {0}
        run: |
          pip install -e "openeo-processes-dask[implementations]"

      - name: Install save-result
        shell: bash -el {0}
        run: |
          pip install -e ".[test,dev]"

      - name: Lint with ruff
        shell: bash -el {0}
        run: |
          ruff check openeo_processes_save_result/ tests/

      - name: Run tests
        shell: bash -el {0}
        run: |
          pytest -v

      - name: Verify import works
        shell: bash -el {0}
        run: |
          python -c "
          from openeo_processes_save_result import save_result
          from openeo_processes_save_result.specs import save_result as spec
          from openeo_processes_save_result._compat import _BACKEND
          print(f'Backend detected: {_BACKEND}')
          print(f'save_result process spec: {spec[\"id\"]}')
          print('All imports OK')
          "
