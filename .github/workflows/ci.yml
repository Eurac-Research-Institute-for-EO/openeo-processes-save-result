name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }} / ${{ matrix.backend.name }}
    runs-on: ${{ matrix.image }}
    strategy:
      matrix:
        os: [Ubuntu]
        python-version: ["3.11", "3.12", "3.13"]
        backend:
          - name: dask-main
            repository: Eurac-Research-Institute-for-EO/openeo-processes-dask
            ref: main
            expected-backend: dask
            expected-rastercube: DataArray
            uninstall-default-dask: "false"
          - name: dask-slim-main
            repository: Eurac-Research-Institute-for-EO/openeo-processes-dask-slim
            ref: main
            expected-backend: dask-slim
            expected-rastercube: DataArray
            uninstall-default-dask: "true"
          - name: dask-slim-dev-remodel
            repository: Eurac-Research-Institute-for-EO/openeo-processes-dask-slim
            ref: dev_remodel
            expected-backend: dask-slim
            expected-rastercube: Dataset
            uninstall-default-dask: "true"
        include:
          - os: Ubuntu
            image: ubuntu-24.04
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }} with geospatial dependencies
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: save-result-test
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          create-args: >-
            python=${{ matrix.python-version }}
            pip
            gdal
            rasterio

      - name: Checkout backend
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.backend.repository }}
          ref: ${{ matrix.backend.ref }}
          path: backend
          submodules: recursive

      - name: Install save-result
        shell: bash -el {0}
        run: |
          pip install -e ".[test,dev]"

      - name: Install selected backend
        shell: bash -el {0}
        run: |
          if [ "${{ matrix.backend.uninstall-default-dask }}" = "true" ]; then
            pip uninstall -y openeo-processes-dask
          fi
          pip install -e "backend[implementations]"

      - name: Lint with ruff
        shell: bash -el {0}
        run: |
          ruff check openeo_processes_save_result/ tests/

      - name: Run tests
        shell: bash -el {0}
        env:
          OPENEO_SAVE_RESULT_EXPECTED_BACKEND: ${{ matrix.backend.expected-backend }}
          OPENEO_SAVE_RESULT_EXPECTED_RASTERCUBE: ${{ matrix.backend.expected-rastercube }}
        run: |
          pytest -v

      - name: Verify import works
        shell: bash -el {0}
        env:
          OPENEO_SAVE_RESULT_EXPECTED_BACKEND: ${{ matrix.backend.expected-backend }}
          OPENEO_SAVE_RESULT_EXPECTED_RASTERCUBE: ${{ matrix.backend.expected-rastercube }}
        run: |
          python -c "
          import xarray as xr
          from openeo_processes_save_result import save_result
          from openeo_processes_save_result.specs import save_result as spec
          from openeo_processes_save_result._compat import RasterCube, _BACKEND
          print(f'Backend detected: {_BACKEND}')
          assert _BACKEND == '${{ matrix.backend.expected-backend }}'
          assert RasterCube is getattr(xr, '${{ matrix.backend.expected-rastercube }}')
          print(f'save_result process spec: {spec[\"id\"]}')
          print('All imports OK')
          "
